<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathway to Freedom</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #007080; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 20px; padding: 40px 32px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
  .dove { font-size: 64px; margin-bottom: 8px; }
  h1 { color: #005f6e; font-size: 26px; font-weight: 900; margin-bottom: 4px; }
  .subtitle { color: #007080; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
  .btn { display: block; width: 100%; padding: 16px; border-radius: 12px; border: none; cursor: pointer;
         font-size: 16px; font-weight: 700; text-decoration: none; margin-bottom: 14px; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: linear-gradient(135deg, #007080, #005f6e); color: white; }
  .btn-leader { background: #e8f4f5; color: #005f6e; }
  .btn-pastor { background: #f0fafa; color: #007080; border: 2px solid #b3dde2; }
  .divider { border: none; border-top: 1px solid #e8f4f5; margin: 18px 0; }
  .section-label { font-size: 11px; color: #999; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
</style>
</head>

<div class="card">

  <a href="leader-dashboard.html?role=yp" class="btn btn-pastor">🏛️ Youth Pastor Dashboard</a>

  <hr class="divider">
  <div class="section-label">Versión en Español</div>
